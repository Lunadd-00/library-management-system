<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioTrack — Mi Perfil</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/perfil.css">
  </head>
  <body>
    <aside class="sidebar" id="menu-principal">
      <div class="sidebar-logo"><img src="img/logo-blanco.png" alt="BiblioTrack"></div>
      <nav class="sidebar-nav">
        <a href="lector.html"><i class="bi bi-grid-1x2"></i> Panel del Lector</a>
        <a href="explorar.html"><i class="bi bi-book"></i> Explorar Libros</a>
        <a href="mis-prestamos.html"><i class="bi bi-journal-text"></i> Mis Préstamos</a>
        <a href="perfil.html" class="activo"><i class="bi bi-person"></i> Mi Perfil</a>
      </nav>
      <div class="sidebar-usuario">
        <div class="avatar-sm">DJ</div>
        <div class="detalle">Derek Jensen<span>Socio #4021</span></div>
      </div>
    </aside>

    <div class="sidebar-overlay"></div>

    <header class="topbar">
      <button class="btn-menu-hamburguesa" aria-label="Abrir menú" aria-expanded="false" aria-controls="menu-principal"><i class="bi bi-list"></i></button>
      <span class="topbar-titulo">Mi Perfil</span>
      <div class="topbar-busqueda"><i class="bi bi-search"></i><input type="search" placeholder="Buscar..."></div>
      <div class="topbar-acciones">
        <div class="topbar-usuario" tabindex="0">
          <div class="info-usuario"><strong>Derek Jensen</strong><span>Lector</span></div>
          <div class="avatar">DJ</div><div class="menu-usuario"><a href="perfil.html"><i class="bi bi-person"></i> Ver perfil</a><a href="login.html"><i class="bi bi-arrow-return-left"></i> Cerrar sesión</a></div>
        </div>
      </div>
    </header>
    <main class="contenido-principal">
      <div class="pagina-encabezado">
        <div><h1>Mi Perfil</h1><p>Administra tu información personal y preferencias.</p></div>
      </div>
      <div class="card" id="perfil-contenido"></div>

      <!-- Modal Editar Perfil -->
      <div class="modal-overlay" id="modal-editar-perfil">
        <div class="modal">
          <div class="modal-header">
            <h2>Editar Perfil</h2>
            <button class="modal-cerrar" data-cerrar-modal="modal-editar-perfil"><i class="bi bi-x-lg"></i></button>
          </div>
          <div class="modal-body">
            <form id="form-perfil" novalidate>
              <div class="form-fila">
                <div class="form-grupo">
                  <label for="perfil-nombre">Nombre Completo</label>
                  <input type="text" id="perfil-nombre">
                </div>
                <div class="form-grupo">
                  <label for="perfil-correo">Correo Electrónico</label>
                  <input type="email" id="perfil-correo">
                </div>
              </div>
              <div class="form-fila">
                <div class="form-grupo">
                  <label for="perfil-telefono">Teléfono</label>
                  <input type="tel" id="perfil-telefono">
                </div>
                <div class="form-grupo">
                  <label for="perfil-direccion">Dirección</label>
                  <input type="text" id="perfil-direccion">
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button class="btn btn-outline" data-cerrar-modal="modal-editar-perfil">Cancelar</button>
            <button class="btn btn-primario" id="btn-guardar-perfil">Guardar Cambios</button>
          </div>
        </div>
      </div>

      <!-- Modal Cambiar Contraseña -->
      <div class="modal-overlay" id="modal-cambiar-clave">
        <div class="modal">
          <div class="modal-header">
            <h2>Cambiar Contraseña</h2>
            <button class="modal-cerrar" data-cerrar-modal="modal-cambiar-clave"><i class="bi bi-x-lg"></i></button>
          </div>
          <div class="modal-body">
            <form id="form-clave" novalidate>
              <div class="form-grupo">
                <label for="clave-actual">Contraseña Actual</label>
                <input type="password" id="clave-actual" placeholder="••••••••">
                <span class="mensaje-error" id="error-clave-actual"></span>
              </div>
              <div class="form-grupo">
                <label for="clave-nueva">Nueva Contraseña</label>
                <input type="password" id="clave-nueva" placeholder="Mínimo 8 caracteres">
                <span class="mensaje-error" id="error-clave-nueva"></span>
              </div>
              <div class="form-grupo">
                <label for="clave-confirmar">Confirmar Nueva Contraseña</label>
                <input type="password" id="clave-confirmar" placeholder="Repetir contraseña">
                <span class="mensaje-error" id="error-clave-confirmar"></span>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button class="btn btn-outline" data-cerrar-modal="modal-cambiar-clave">Cancelar</button>
            <button class="btn btn-primario" id="btn-cambiar-clave-modal">Actualizar Contraseña</button>
          </div>
        </div>
      </div>

    </main>
    <footer class="footer"><span>&copy; 2026 BiblioTrack. Todos los derechos reservados.</span></footer>
    <script src="js/menu.js"></script>
    <script src="js/perfil.js"></script>
  </body>
</html>
